<!DOCTYPE html>
<html>
<head>
  <title>Patient Tracker</title>
  <style>
    body { font-family: Arial; margin:0; background:#f5f7fa;}
    .header { background:#1e7e34; padding:15px; text-align:center; color:white; }
    .container { max-width:500px; margin:20px auto; background:white; padding:20px; border-radius:10px; }
    
    label { font-weight:bold; display:block; margin-top:10px; }
    input, select, button { width:100%; padding:10px; margin:6px 0 12px 0; }
    
    button { background:#1e7e34; color:white; border:none; font-size:16px; cursor:pointer; }
    button:hover { background:#17692c; }
  </style>
</head>

<body>

<div class="header">
  <h2>Patient File Tracking</h2>
</div>

<div class="container">
  <h3 id="roomDisplay"></h3>

  <form id="form">

    <label>MRN (Patient Number)</label>
    <input type="text" id="mrn" placeholder="Enter MRN" required>

    <label>Transaction Type</label>
    <select id="transaction">
      <option>Admission</option>
      <option>Discharge</option>
      <option>Transfer IN</option>
      <option>Transfer OUT</option>
    </select>

    <label>Paper Portion Available?</label>
    <select id="paper">
      <option>Yes</option>
      <option>No</option>
    </select>

    <label>Staff ID</label>
    <input type="text" id="staff" placeholder="Enter Staff ID" required>

    <button type="submit">Submit</button>
  </form>
</div>

<script>
// Get room from NFC link
const params = new URLSearchParams(window.location.search);
const room = params.get("room");
document.getElementById("roomDisplay").innerText = "Room: " + room;

// Google Form URL
const formURL = "https://docs.google.com/forms/d/e/1FAIpQLScuh88g_gjHoNuFjP_yKGaN6rBBEDbOoF6-SAOiIwrDe8ALlw/formResponse";

// Entry IDs
const fields = {
  room: "entry.2005620554",
  mrn: "entry.1045781291",
  transaction: "entry.1065046570",
  paper: "entry.1166974658",
  staff: "entry.839337160"
};

document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  const data = new FormData();
  data.append(fields.room, room);
  data.append(fields.mrn, document.getElementById("mrn").value);
  data.append(fields.transaction, document.getElementById("transaction").value);
  data.append(fields.paper, document.getElementById("paper").value);
  data.append(fields.staff, document.getElementById("staff").value);

  fetch(formURL, {
    method: "POST",
    mode: "no-cors",
    body: data
  });

  alert("Saved successfully!");
  document.getElementById("form").reset();
});
</script>

</body>
</html>
