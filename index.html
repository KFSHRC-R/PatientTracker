<!DOCTYPE html>
<html>
<head>
  <title>Patient Tracker</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f7fa;
      margin: 0;
    }

    .header {
      background: #1e7e34;
      padding: 15px;
      text-align: center;
      color: white;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      max-width: 420px;
      margin: 30px auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
    }

    h3 {
      text-align: center;
      margin-bottom: 20px;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      font-size: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button {
      background: #1e7e34;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #166528;
    }
  </style>
</head>

<body>

<div class="header">
  Patient File Tracking
</div>

<div class="container">

  <h3 id="roomDisplay">Room: --</h3>

  <input id="mrn" placeholder="Enter MRN">

  <select id="transaction">
    <option value="">Select Transaction</option>
    <option>Admission</option>
    <option>Discharge</option>
    <option>Transfer IN</option>
    <option>Transfer OUT</option>
  </select>

  <select id="paper">
    <option value="">Paper Portion?</option>
    <option>Yes</option>
    <option>No</option>
  </select>

  <input id="staff" placeholder="Enter Staff ID">

  <button onclick="submitData()">Submit</button>

</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbz9SJvowkVnAdELRG7WZEAz33TVW6sbq-UOuemPJyePppdw8umT7oEM4GMM6BAvGOI-/exec";

// Get room from URL
const params = new URLSearchParams(window.location.search);
const room = params.get("room");

document.getElementById("roomDisplay").innerText = "Room: " + (room || "--");

function submitData() {

  const mrn = document.getElementById("mrn").value;
  const transaction = document.getElementById("transaction").value;
  const paper = document.getElementById("paper").value;
  const staff = document.getElementById("staff").value;

  if (!room || !mrn || !transaction || !paper || !staff) {
    alert("Please fill all fields");
    return;
  }

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify({
      room: room,
      mrn: mrn,
      transaction: transaction,
      paper: paper,
      staff: staff
    })
  })
  .then(res => res.text())
  .then(() => {
    alert("Saved successfully ✅");

    // Clear fields after submit
    document.getElementById("mrn").value = "";
    document.getElementById("transaction").value = "";
    document.getElementById("paper").value = "";
    document.getElementById("staff").value = "";
  })
  .catch(err => {
    alert("Error saving ❌");
    console.error(err);
  });
}
</script>

</body>
</html>
