<!DOCTYPE html>
<html>
<head>
  <title>Patient Tracker</title>
  <style>
    body { font-family: Arial; margin:0; background:#f5f7fa;}
    .header { background:#1e7e34; padding:15px; text-align:center; }
    .header img { max-width:200px; }
    .container { max-width:500px; margin:20px auto; background:white; padding:20px; border-radius:10px; }
    h2 { text-align:center; }
    input, select, button { width:100%; padding:10px; margin:8px 0; }
    button { background:#1e7e34; color:white; border:none; cursor:pointer; }
  </style>
</head>

<body>

<div class="header">
  <img src="logo.png">
</div>

<div class="container">
  <h2>Patient File Tracking</h2>
  <h3 id="roomDisplay"></h3>

  <form id="form">
    <label>MRN</label>
    <input type="text" id="mrn" required>

    <label>Transaction</label>
    <select id="transaction">
      <option>Discharge</option>
      <option>Admission</option>
      <option>Transfer</option>
    </select>

    <label>Paper Portion</label>
    <select id="paper">
      <option>Yes</option>
      <option>No</option>
    </select>

    <label>Staff ID</label>
    <input type="text" id="staff" required>

    <button type="submit">Submit</button>
  </form>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const room = params.get("room");

document.getElementById("roomDisplay").innerText = "Room: " + room;

document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  await addDoc(collection(db, "logs"), {
    room: room,
    mrn: document.getElementById("mrn").value,
    transaction: document.getElementById("transaction").value,
    paper: document.getElementById("paper").value,
    staff: document.getElementById("staff").value,
    time: new Date().toLocaleString()
  });

  alert("Saved!");
  document.getElementById("form").reset();
});
</script>

</body>
</html>
